name: LoginExample
options:
  bundleIdPrefix: com.wiraagent
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES

targets:
  LoginExample:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Sources/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wiraagent.LoginExample
        INFOPLIST_FILE: SupportingFiles/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - LoginExampleTests

  LoginExampleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: LoginExample
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wiraagent.LoginExampleTests
